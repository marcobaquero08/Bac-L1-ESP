  // 4. TEATRO
  // ══════════════════════════════════════════════════
  {id:'t-40',sec:'teatro',badge:'Años 40',badgeClass:'b40',title:'4.1 El teatro de los años 40: Comedia burguesa y teatro de humor',open:true,body:`
<p>En los años 40, muchos dramaturgos importantes habían fallecido o marchado al exilio. La censura del régimen ponía límites a toda creación literaria.</p>
<div class="tc">
  <div class="tc-box">
    <h5>La Comedia Burguesa</h5>
    <p>Teatro tradicional, arraigado y comercial dirigido a un público de clase media-alta. Objetivo: entretener y transmitir la ideología del régimen (familia, matrimonio, el hogar). Conflictos individuales y cotidianos; deja de lado lo existencial o social. Crítica suave de algunas costumbres burguesas. Obras bien construidas con diálogos elaborados.</p>
  </div>
  <div class="tc-box">
    <h5>La Renovación del Teatro de Humor</h5>
    <p>Teatro menos convencional con propuestas innovadoras. Se refugia en la ilusión y el humor para aliviar las limitaciones de la vida (debido a la censura). Genera situaciones cercanas al teatro absurdo; se aleja del realismo y da cabida a lo inverosímil y lo insólito. Esta absurdidad podría interpretarse como crítica al régimen.</p>
  </div>
</div>`},

  {id:'t-somb',sec:'teatro',badge:'Obra',badgeClass:'bObra',title:'4.1.1 Miguel Mihura — Tres sombreros de copa (1952)',body:`
<p>Escrita en 1932, aunque estrenada veinte años más tarde. Una de las obras fundamentales del teatro español del siglo XX y un claro antecedente del teatro del absurdo. Desarrollada íntegramente en una habitación de hotel durante una sola noche: la última noche de soltero de Dionisio. Estructura circular: comienza y termina con la entrada y salida de Dionisio y don Rosario, subrayando la imposibilidad de cambio.</p>
<h4>Temas</h4>
<ul>
  <li><strong>La felicidad imposible:</strong> Dionisio tiene la oportunidad de elegir una vida distinta con Paula pero finalmente renuncia.</li>
  <li><strong>Enfrentamiento entre dos concepciones de la vida:</strong> seguridad/orden/convenciones sociales frente a libertad/improvisación/mundo del espectáculo.</li>
</ul>
<h4>Espacio y Tiempo</h4>
<p>Espacio único y cerrado: una <strong>habitación de hotel</strong> en una capital de provincia europea de segundo orden. Tiempo dramático: <strong>una sola noche</strong>; desarrollo temporal lineal y cronológico.</p>
<h4>Estilo</h4>
<ul>
  <li>Diálogos ágiles y rápidos; pocas intervenciones largas.</li>
  <li>Monólogos únicamente de Dionisio (antes de la entrada de Paula y en presencia de Buby).</li>
  <li>Un aparte cuando Dionisio cree que su futuro suegro ha muerto.</li>
  <li>Acotaciones: las que encabezan los actos (espacio escénico) y las que aparecen entre paréntesis (gestos, actitudes, tonos).</li>
  <li>Lenguaje coloquial, a veces más literario o infantil.</li>
  <li><strong>Humorismo:</strong> a través del lenguaje (sorpresa, literalidad, exageración, razonamientos absurdos), de las situaciones (inesperadas y paródicas) y de los personajes (apariencia, gestos, comportamiento).</li>
</ul>`},

  {id:'t-men',sec:'teatro',badge:'Obra',badgeClass:'bObra',title:'4.1.2 Antonio Buero Vallejo — Las Meninas (1960)',body:`
<p>Obra de teatro histórico de Buero Vallejo ambientada en la corte de Felipe IV, siglo XVII. A través de la figura de Velázquez reflexiona sobre el arte y el artista en una sociedad dominada por el poder. Aunque la acción se sitúa en el pasado, tiene una clara intención alegórica: el siglo XVII como marco para criticar indirectamente la España franquista. Estructura cerrada y progresiva organizada en tres actos.</p>
<h4>Temas</h4>
<ul>
  <li>El conflicto entre <strong>el arte y el poder</strong>: Velázquez encarna al artista íntegro que defiende la verdad frente a la nobleza y la Inquisición.</li>
  <li>La libertad creadora; la dignidad individual frente a la injusticia.</li>
  <li>La envidia social; la represión ideológica.</li>
  <li>El uso del pasado histórico para denunciar la censura franquista.</li>
</ul>
<h4>Espacio y Tiempo</h4>
<p><strong>Alcázar de Madrid</strong> (espacio cerrado y opresivo, símbolo del poder) y <strong>taller de Velázquez</strong> (espacio simbólico de libertad y creación artística). Tiempo histórico: siglo XVII, reinado de Felipe IV. Tiempo dramático: lineal y continuo, condensado en pocos momentos clave.</p>
<h4>Estilo</h4>
<p>Sobrio y reflexivo. Diálogos densos cargados de contenido ideológico y moral. Acotaciones relevantes que crean atmósfera de opresión. Lenguaje cuidado y preciso, accesible al espectador contemporáneo. El pasado como medio para interpelar al presente.</p>`},

  {id:'t-50soc',sec:'teatro',badge:'Años 50-60',badgeClass:'b50',title:'4.2 Teatro existencial y social (años 50-60)',open:true,body:`
<h4>El Teatro Existencial</h4>
<p>Representa conflictos propios de la condición humana: soledad, incomunicación, falta de sentido vital, frustraciones personales, angustia por el paso del tiempo. Ya se aprecian dosis de crítica social.</p>
<h4>El Teatro del Realismo Social</h4>
<p>Desde mediados de los 50 hasta finales de los 60, teatro inconformista y comprometido:</p>
<ul>
  <li>Aborda los problemas de la sociedad española: injusticias, explotación obrera, falta de libertad, represión policial.</li>
  <li>Algunas obras sitúan la crítica en periodos históricos pasados (paralelismos con el presente, evitando la censura).</li>
  <li>Técnica realista y lenguaje coloquial y directo; en algún autor, rasgos expresionistas cercanos al «esperpento».</li>
  <li>Personajes humildes, habitualmente víctimas de la guerra o del franquismo.</li>
  <li>Escenografía con espacios populares y reconocibles; rechazo del experimentalismo.</li>
</ul>`},

  {id:'t-50aut',sec:'teatro',badge:'Autores',badgeClass:'bTeatro',title:'4.2.1 Autores: Buero Vallejo y Sastre',body:`
<h4>Antonio Buero Vallejo (1916–2000)</h4>
<p>Figura central del teatro español de posguerra. Condenado a muerte tras la Guerra Civil (pena conmutada). Combina reflexión existencial con denuncia social.</p>
<ul>
  <li><em>Historia de una escalera</em> (1949): una escalera de vecinos como testigo del paso del tiempo y de las limitaciones de la existencia.</li>
  <li><em>El tragaluz</em> (1967): dos investigadores del futuro observan una familia destruida por la guerra, reflexionando sobre la culpa colectiva.</li>
  <li>Dramas históricos: <em>Un soñador para un pueblo</em> (1958, Esquilache); <em>Las Meninas</em> (1960, Velázquez); <em>El sueño de la razón</em> (1970, Goya). Usa el pasado para criticar el franquismo.</li>
</ul>
<h4>Alfonso Sastre (1926–2021)</h4>
<p>Vertiente más radical y combativa. A diferencia de Buero (estrategia «posibilista»), Sastre defendió un teatro de ruptura sin concesiones, lo que le acarreó frecuentes prohibiciones.</p>
<ul>
  <li><em>La mordaza</em> (1954): tiranía de un padre sobre su familia como metáfora de la opresión política.</li>
  <li><em>La sangre y la ceniza</em> (1961-65): martirio de Miguel Servet; alegoría sobre la intolerancia.</li>
  <li><em>La taberna fantástica</em> (1966, estrenada 1985): ambientes marginales del Madrid popular con elementos expresionistas cercanos al esperpento.</li>
</ul>`},

  {id:'t-70exp',sec:'teatro',badge:'Años 70',badgeClass:'b70',title:'4.3 Teatro experimental de los años 70',open:true,body:`
<p>A finales de los 60 y durante los 70, el teatro cuestiona la estética realista, recogiendo las propuestas del teatro de vanguardia europeo (Brecht, Artaud, Beckett). Los temas son similares, pero el lenguaje teatral es radicalmente nuevo.</p>
<h4>Características</h4>
<ul>
  <li>El teatro concebido como <strong>espectáculo total</strong> con participación activa del público.</li>
  <li>El texto pierde importancia frente a los recursos sonoros, visuales y corporales (comedia musical, revista, circo).</li>
  <li>El realismo psicológico deja paso a lo surreal, lo esperpéntico (enlazando con Valle-Inclán) y a diálogos y situaciones absurdas.</li>
  <li>Animalización o degradación de los personajes; acción no lineal.</li>
  <li>Preferencia por la farsa grotesca y la sátira para criticar la historia y la idiosincrasia española.</li>
</ul>
<h4>Temas</h4>
<ul>
  <li>Injusticias sociales y falta de libertad; denuncia del franquismo.</li>
  <li>Incomunicación y soledad del individuo; lo absurdo de la guerra y la violencia como mecanismos de poder.</li>
</ul>`},

  {id:'t-70aut',sec:'teatro',badge:'Autores',badgeClass:'bTeatro',title:'4.3.1 Autores: Arrabal, Nieva, Teatro independiente, Gala',body:`
<h4>Fernando Arrabal (1932)</h4>
<p>Teatro cercano al absurdo, influido por su exilio en Francia desde 1955. Sus obras se centran en la incomunicación, la soledad, lo absurdo de la guerra y el derrumbe de las estructuras sociales. Visión pesimista de la condición humana. Obras: <em>Picnic</em> (1952), <em>El triciclo</em> (1953), <em>El arquitecto y el emperador de Asiria</em> (1966).</p>
<h4>Francisco Nieva (1924–2016)</h4>
<p>Formado como escenógrafo. Muy influido por el carnaval, el esperpento y el surrealismo. Crea el «teatro furioso»: libertad imaginativa, ironía, puesta en escena barroca y espectacular, mezcla de expresiones populares con lenguaje culto y recargado. Obras: <em>La carroza de plomo candente</em> (1976), <em>Pelo de Tormenta</em> (1997).</p>
<h4>El Teatro Independiente</h4>
<p>Grupos como Tábano, Els Joglars, Els Comediants, La Cubana, <strong>La Fura dels Baus</strong> proponen el teatro como espectáculo total. Influidos por el teatro del absurdo y el teatro de la crueldad de Artaud. La Fura dels Baus crea espacios envolventes de sonido e industriales donde los actores realizan, entre el público, rituales que sugieren el poder y la violencia.</p>
<h4>Antonio Gala (1930–2023)</h4>
<p>A partir de los 70, el dramaturgo de mayor éxito de la escena española. Teatro que mezcla realismo y lirismo («teatro poético»), con lenguaje cuidado y brillante. Temas: el amor, la libertad, la crítica a la hipocresía y la intransigencia. Obras: <em>Los buenos días perdidos</em> (1972), <em>Anillos para una dama</em> (1973), <em>¿Por qué corres, Ulises?</em> (1974).</p>`},

  {id:'t-80',sec:'teatro',badge:'Años 80',badgeClass:'b80',title:'4.4 El teatro de los años 80: Los nuevos realismos',open:true,body:`
<p>Con la llegada del PSOE al poder en 1982, España vive profundos cambios. Conviven la modernización con graves problemas: desempleo, drogadicción, delincuencia y terrorismo. Muchos dramaturgos dan la espalda al experimentalismo radical y recuperan la tradición realista para conectar con el público.</p>
<h4>Características</h4>
<ul>
  <li>Revalorización del <strong>realismo social y el sainete costumbrista</strong>.</li>
  <li>Temas de la España de la época: paro, drogas, delincuencia y terrorismo.</li>
  <li>Lugares, anécdotas y situaciones próximas y reconocibles por el público.</li>
  <li>Interés por personajes marginales o fracasados (drogadicción, delincuencia, inadaptación).</li>
  <li>La <strong>ironía y la ternura</strong> juegan un papel clave: no juzgan a sus personajes sino que los miran con humor, compasión y distancia crítica.</li>
  <li>Compromiso con la sociedad de su tiempo; voluntad de denuncia.</li>
</ul>`},

  {id:'t-80aut',sec:'teatro',badge:'Autores',badgeClass:'bTeatro',title:'4.4.1 Autores: Alonso de Santos, Sanchís Sinisterra, Fernán Gómez',body:`
<h4>José Luis Alonso de Santos (1942)</h4>
<p>Figura más representativa del «neorrealismo» o «neocostumbrismo». Personajes, situaciones y ambientes populares retratados con mirada a la vez dura y tierna. <em>La estanquera de Vallecas</em> (1981): atracadores y atracados terminan jugando a las cartas. <em>Bajarse al moro</em> (1985): una de las obras clave del teatro español de finales del XX, retratando la juventud urbana y la marginalidad.</p>
<h4>José Sanchís Sinisterra (1940)</h4>
<p>Autor, director, pedagogo y traductor. Nivel literario muy alto y constante experimentación. El humor se combina con el dramatismo y una mirada tierna e irónica. Obra cumbre: <em>¡Ay, Carmela!</em> (1987): emotivo diálogo entre vivos y muertos ambientado en la Guerra Civil. Dos cómicos de variedades —Carmela y Paulino— obligados a actuar ante soldados del ejército nacional, mientras asisten como testigos a la última función de brigadistas internacionales antes de ser fusilados. Llevada al cine por Carlos Saura en 1990.</p>
<h4>Fernando Fernán Gómez (1921–2007)</h4>
<p>Figura polifacética del cine y el teatro. Obra cumbre: <em>Las bicicletas son para el verano</em> (escrita en 1977, estrenada en 1982). Situada en el verano de 1936 al inicio de la Guerra Civil, se centra en la vida cotidiana de una familia cuyos personajes simbolizan distintas ideologías. A pesar de las desigualdades, todos se ayudan para seguir viviendo: visión humanista sin maniqueísmo. Versión cinematográfica de Jaime Chávarri en 1984.</p>`},

  {id:'t-90',sec:'teatro',badge:'Años 90+',badgeClass:'b90',title:'4.5 El teatro desde los años 90: últimas tendencias',open:true,body:`
<p>Nueva generación de dramaturgos que recoge el testigo de maestros como Buero Vallejo, Nieva y Sanchís Sinisterra. Sus obras y trayectorias son dispares pero comparten una voluntad común: superar el realismo costumbrista de los 80 y el experimentalismo de los 70.</p>
<h4>Características</h4>
<ul>
  <li>Reflexión histórica, filosófica y social sobre el poder, la violencia y la manipulación para abordar los orígenes de los problemas actuales.</li>
  <li>No pretenden dar respuestas sino <strong>plantear preguntas</strong> que el espectador ha de responder por sí mismo.</li>
  <li>Temas: la sociedad actual y la historia reciente de Europa (holocausto nazi, guerra civil, guerra fría) → «teatro filosófico».</li>
  <li>Intertextualidad: algunas obras se basan en obras anteriores de la tradición.</li>
  <li>El texto dramático recupera gran relevancia y se enriquece con elementos del guion cinematográfico, el videoclip, la danza o la música.</li>
  <li>Tendencia al «teatro pobre» (Jerzy Grotowski): texto, actores e imaginación del público.</li>
</ul>`},

  {id:'t-90aut',sec:'teatro',badge:'Autores',badgeClass:'bTeatro',title:'4.5.1 Autores: Mayorga y Conejero',body:`
<h4>Juan Mayorga (1965)</h4>
<p>Licenciado en Matemáticas y Doctor en Filosofía (tesis sobre Walter Benjamin). La figura más destacada de su generación. Defiende la capacidad de la palabra para cuestionar creencias asumidas, convencer y liberar. Da gran importancia a la argumentación del texto.</p>
<ul>
  <li>Obras históricas: <em>Cartas de amor a Stalin</em> (1997), <em>El cartógrafo</em> (2009), <em>La lengua en pedazos</em> (2011, basada en Santa Teresa).</li>
  <li>Dramas sobre problemas actuales: <em>El chico de la última fila</em> (2006), <em>El mago</em> (2017).</li>
  <li>Otros autores de su generación: Paloma Pedreño, Laura Ripoll, Sergi Belbel, Ignacio García May.</li>
</ul>
<h4>Alberto Conejero (1978)</h4>
<p>Ligado a los escenarios alternativos de Madrid (Nave73, La pensión de pulgas). Su obra interpela al espectador sobre su identidad y esencia, con especial atención a los derechos LGTBI y la homosexualidad. <em>Cliff</em> (2010): inspirada en episodios de la biografía de Montgomery Clift. <em>La piedra oscura</em> (2015): recrea la relación entre Federico García Lorca y su último compañero, Rafael Rodríguez Rapún, en los días antes del fusilamiento del poeta.</p>
<p>Otros autores de su generación: Alfredo Sanzol, Lucía Carballal, María Velasco, Pablo Messiez.</p>`},

  // ══════════════════════════════════════════════════
  // 5. ENSAYO
  // ══════════════════════════════════════════════════
  {id:'e-arg1',sec:'ensayo',badge:'Argumento 1',badgeClass:null,title:'Argumento 1: La sociedad condiciona la libertad',open:true,body:`
<p><strong>Tesis:</strong> El ser humano cree elegir libremente, pero sus decisiones están profundamente condicionadas por la sociedad y las circunstancias.</p>
<p><strong>Idea central:</strong> Aunque los personajes parecen tomar decisiones propias, en realidad el entorno social, las normas y las expectativas colectivas limitan su libertad. Vivir es elegir, sí, pero no en igualdad de condiciones.</p>
<h4>Tres sombreros de copa — Miguel Mihura</h4>
<p>Dionisio debe decidir entre una vida libre con Paula o el matrimonio burgués que le espera. Aunque existe una posibilidad real de elección, la presión social es más fuerte: el trabajo serio, el matrimonio respetable, la estabilidad económica. Finalmente, Dionisio renuncia a su deseo y elige lo que la sociedad espera de él. Su elección no es plenamente libre, sino resultado del miedo a salirse de la norma.</p>
<p><em>Ejemplo clave: la boda representa el orden social que aplasta la espontaneidad y la felicidad personal.</em></p>
<h4>La buena suerte — Rosa Montero</h4>
<p>Pablo cree huir libremente de su pasado al bajarse del tren en un pueblo cualquiera. Sin embargo, su comportamiento está marcado por el trauma, la culpa y el miedo, es decir, por su historia personal. Aunque parece una decisión espontánea, en realidad está condicionado psicológicamente: no elige desde la libertad, sino desde la huida.</p>
<p><em>Idea importante: la sociedad y el pasado personal pesan tanto como una ley explícita.</em></p>
<h4>Relato de un náufrago — Gabriel García Márquez</h4>
<p>El marinero no elige estar en la balsa: es víctima de una negligencia del sistema militar. Incluso cuando lucha por sobrevivir, sus acciones están condicionadas por el hambre, la sed y el instinto. Aquí la libertad casi desaparece: sobrevivir no es elegir, es reaccionar.</p>
<p><em>Conclusión parcial: la libertad puede verse anulada por condiciones extremas.</em></p>`},

  {id:'e-arg2',sec:'ensayo',badge:'Argumento 2',badgeClass:null,title:'Argumento 2: El ser humano conserva una libertad interior',body:`
<p><strong>Tesis:</strong> A pesar de los condicionamientos, el ser humano conserva una libertad interior: siempre puede elegir su actitud y su respuesta.</p>
<p><strong>Idea central:</strong> Aunque no podamos controlar las circunstancias, sí podemos decidir cómo afrontarlas. La libertad no siempre es externa, sino moral y personal.</p>
<h4>Relato de un náufrago</h4>
<p>El protagonista no decide el naufragio, pero elige resistir, no rendirse, mantener la esperanza. Incluso cuando delira, su voluntad de vivir se impone. Su libertad se manifiesta en su determinación, no en sus condiciones materiales.</p>
<p><em>Ejemplo claro: podría dejarse morir, pero decide luchar cada día.</em></p>
<h4>La buena suerte</h4>
<p>Pablo, tras huir, elige finalmente enfrentarse a su pasado y reconstruirse. El encuentro con Raluca es decisivo: ella representa una forma distinta de vivir, más abierta y humana. Aquí la libertad aparece cuando el personaje deja de huir y asume la responsabilidad de sus actos.</p>
<p><em>Vivir es elegir no esconderse ni escapar más.</em></p>
<h4>Tres sombreros de copa</h4>
<p>Aunque Dionisio acaba sometiéndose, durante la noche con Paula experimenta una libertad auténtica: ríe, juega, imagina otra vida. Ese momento demuestra que la libertad existe, aunque sea breve y frágil.</p>
<p><em>La obra muestra que la libertad es posible, pero exige valentía.</em></p>`},

  {id:'e-arg3',sec:'ensayo',badge:'Argumento 3',badgeClass:null,title:'Argumento 3: Elegir implica responsabilidad',body:`
<p><strong>Tesis:</strong> Elegir implica responsabilidad: la verdadera libertad no es hacer lo que uno quiere, sino asumir las consecuencias.</p>
<p><strong>Idea central:</strong> Las obras muestran que la libertad no es gratuita: cada elección tiene un precio, y muchos personajes prefieren la seguridad a la autenticidad.</p>
<h4>La buena suerte</h4>
<p>Pablo comprende que no basta con huir: vivir exige responsabilizarse del daño causado. Solo cuando acepta su pasado puede aspirar a una vida más plena. La libertad auténtica nace del reconocimiento del error.</p>
<h4>Tres sombreros de copa</h4>
<p>Dionisio no asume el riesgo de elegir a Paula: prefiere una vida segura pero vacía. Su elección lo condena a una existencia previsible, sin pasión. La obra critica una sociedad donde la comodidad sustituye a la libertad.</p>
<h4>Relato de un náufrago</h4>
<p>El protagonista asume cada decisión como una cuestión de vida o muerte. No hay espacio para la irresponsabilidad. Aquí, elegir significa sobrevivir o morir, lo que subraya la gravedad del acto de elegir.</p>`},

  {id:'e-concl',sec:'ensayo',badge:'Conclusión',badgeClass:null,title:'Conclusión global',open:true,body:`
<p>Las tres obras coinciden en que <strong>vivir es elegir</strong>, pero no desde una libertad absoluta. El ser humano está condicionado por la sociedad, el pasado y las circunstancias, sin embargo conserva una libertad interior que le permite decidir su actitud y asumir responsabilidades.</p>
<p><strong>La verdadera libertad no consiste en escapar, sino en afrontar la vida con conciencia y valentía.</strong></p>
<h4>Síntesis por obra</h4>
<ul>
  <li><strong>Tres sombreros de copa (Mihura):</strong> La presión social aplasta la libertad, pero en el encuentro con Paula existe un atisbo de vida auténtica.</li>
  <li><strong>La buena suerte (Rosa Montero):</strong> La huida no es libertad. Solo la responsabilidad sobre el propio pasado permite reconstruirse.</li>
  <li><strong>Relato de un náufrago (García Márquez):</strong> Incluso en las condiciones más extremas, la voluntad de vivir es una forma de libertad.</li>
</ul>`},
];

// ── RENDERING ─────────────────────────────────────────
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  NAV.forEach(sec => {
    html += `<div class="ng">
      <div class="ng-hdr open" id="ng-${sec.id}" onclick="toggleGroup('${sec.id}')">
        <span class="ng-dot" style="background:${sec.color}"></span>
        <span>${sec.icon} ${sec.label}</span>
        <span class="ng-arr">▶</span>
      </div>
      <div class="ns open" id="ns-${sec.id}">`;
    sec.items.forEach(item => {
      html += `<div class="ni${item.sub ? ' sub' : ''}" id="ni-${item.id}" onclick="scrollToCard('${item.id}')">${item.label}</div>`;
    });
    html += `</div></div>`;
  });
  sb.innerHTML = html;
}

function renderContent() {
  const ct = document.getElementById('content');
  const secOrder = ['analisis','narrativa','poesia','teatro','ensayo'];
  const secMeta = {
    analisis:  {title:'1. Análisis Textual',  icon:'📝', color:'#3b82f6'},
    narrativa: {title:'2. Narrativa',          icon:'📖', color:'#f59e0b'},
    poesia:    {title:'3. Poesía',             icon:'🎭', color:'#a855f7'},
    teatro:    {title:'4. Teatro',             icon:'🎪', color:'#14b8a6'},
    ensayo:    {title:'5. Ensayo / Argumentación', icon:'✍️', color:'#f43f5e'},
  };
  let html = '';
  secOrder.forEach(secId => {
    const meta = secMeta[secId];
    const cards = CARDS.filter(c => c.sec === secId);
    html += `<div id="sec-${secId}" class="sh">
      <div class="sh-bar" style="background:${meta.color}"></div>
      <span class="sh-icon">${meta.icon}</span>
      <h2>${meta.title}</h2>
    </div>`;
    cards.forEach(card => {
      const badgeHtml = card.badge ? `<span class="badge ${card.badgeClass||''}">${card.badge}</span>` : '';
      html += `<div class="card${card.open?' open':''}" id="card-${card.id}">
        <div class="ch" onclick="toggleCard('${card.id}')">
          <div class="ch-title">${card.title}</div>
          ${badgeHtml}
          <span class="ch-arr">▼</span>
        </div>
        <div class="cb">${card.body}</div>
      </div>`;
    });
  });
  html += '<div id="nr"><p>No se encontraron resultados.</p><small>Intenta con otro término.</small></div>';
  ct.innerHTML = html;
}

// ── INTERACTIONS ──────────────────────────────────────
function toggleGroup(id) {
  const hdr = document.getElementById('ng-'+id);
  const sub = document.getElementById('ns-'+id);
  hdr.classList.toggle('open');
  sub.classList.toggle('open');
}

function toggleCard(id) {
  document.getElementById('card-'+id).classList.toggle('open');
}

function scrollToCard(id) {
  const el = document.getElementById('card-'+id);
  if (!el) return;
  el.classList.add('open');
  el.scrollIntoView({behavior:'smooth', block:'start'});
  // close sidebar on mobile
  if (window.innerWidth < 720) document.getElementById('sidebar').classList.remove('open');
  // highlight nav item
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
  const ni = document.getElementById('ni-'+id);
  if (ni) ni.classList.add('active');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── SEARCH ────────────────────────────────────────────
let searchTimer;
function doSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => _search(val.trim()), 180);
}

function _search(q) {
  const sc = document.getElementById('sc');
  const fc = document.getElementById('fc');
  const nr = document.getElementById('nr');
  sc.style.display = q ? 'block' : 'none';

  // Restore all cards if empty
  if (!q) {
    document.querySelectorAll('.card').forEach(c => {
      c.classList.remove('hidden');
      // restore original body (remove marks)
      const cb = c.querySelector('.cb');
      cb.innerHTML = cb.innerHTML.replace(/<mark>|<\/mark>/g,'');
    });
    document.querySelectorAll('.sh, .sub-hdr').forEach(e => e.classList.remove('hidden'));
    fc.textContent = '';
    nr.style.display = 'none';
    return;
  }

  const ql = q.toLowerCase();
  let found = 0;

  document.querySelectorAll('.card').forEach(card => {
    const text = card.textContent.toLowerCase();
    if (text.includes(ql)) {
      card.classList.remove('hidden');
      card.classList.add('open');
      // highlight
      const cb = card.querySelector('.cb');
      const clean = cb.innerHTML.replace(/<mark>|<\/mark>/g,'');
      cb.innerHTML = clean.replace(new RegExp('('+escRe(q)+')', 'gi'), '<mark>$1</mark>');
      found++;
    } else {
      card.classList.add('hidden');
    }
  });

  // Show section headers only if they have visible cards
  document.querySelectorAll('.sh').forEach(sh => {
    const secId = sh.id.replace('sec-','');
    const hasVisible = [...document.querySelectorAll('.card')].some(c => c.id.includes(secId.slice(0,4)) && !c.classList.contains('hidden') && CARDS.find(cd=>('card-'+cd.id)===c.id&&cd.sec===secId));
    sh.classList.toggle('hidden', !hasVisible);
  });

  fc.textContent = found ? `${found} resultado${found>1?'s':''}` : '';
  nr.style.display = found ? 'none' : 'block';
}

function clearSearch() {
  document.getElementById('search').value = '';
  _search('');
}

function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

// ── SCROLL TRACKING ───────────────────────────────────
function onScroll() {
  const ct = document.getElementById('content');
  const btt = document.getElementById('btt');
  btt.style.display = ct.scrollTop > 300 ? 'flex' : 'none';

  // Active nav item
  const cards = document.querySelectorAll('.card:not(.hidden)');
  let activeId = null;
  cards.forEach(c => {
    const rect = c.getBoundingClientRect();
    if (rect.top < 120) activeId = c.id.replace('card-','');
  });
  if (activeId) {
    document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
    const ni = document.getElementById('ni-'+activeId);
    if (ni) {
      ni.classList.add('active');
      ni.scrollIntoView({block:'nearest'});
    }
  }
}

function goTop() {
  document.getElementById('content').scrollTo({top:0,behavior:'smooth'});
}

// ── THEME TOGGLE ──────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDay = html.classList.toggle('day');
  const icon = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  if (isDay) {
    icon.textContent = '🌙';
    label.textContent = 'Noche';
  } else {
    icon.textContent = '☀️';
    label.textContent = 'Día';
  }
}

// ── INIT ──────────────────────────────────────────────
renderSidebar();
renderContent();
document.getElementById('content').addEventListener('scroll', onScroll);
</script>
